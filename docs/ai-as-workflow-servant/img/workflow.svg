 lengthAdjust='spacing' textLength='81.4531' x='342' y='1773.9961'>Skill's role:</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='271.0513' x='342' y='1789.7954'>&#8226; Matches user intent &#8594; correct workflow</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='254.3315' x='342' y='1805.5947'>&#8226; Tells AI how to start the orchestrator</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='269.2041' x='342' y='1821.394'>&#8226; Prompt-handling table: how to respond</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='184.6724' x='351.1406' y='1837.1934'>to each orchestrator prompt</text><path d='M115,1854.9229 L115,1958.9229 L380,1958.9229 L380,1864.9229 L370,1854.9229 L115,1854.9229' fill='#FFB6C1' style='stroke:#000000;stroke-width:1;'/><path d='M370,1854.9229 L370,1864.9229 L380,1864.9229 L370,1854.9229' fill='#FFB6C1' style='stroke:#000000;stroke-width:1;'/><text fill='#000000' font-family='Verdana' font-size='13' font-weight='bold' lengthAdjust='spacing' textLength='67.355' x='121' y='1872.9927'>AI's role:</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='212.1006' x='121' y='1888.792'>&#8226; Dispatches user intent to skills</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='224.9102' x='121' y='1904.5913'>&#8226; Runs orchestrator as subprocess</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='235.1997' x='121' y='1920.3906'>&#8226; Responds to orchestrator prompts</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='160.7163' x='130.1406' y='1936.1899'>(self-service or via user)</text><text fill='#000000' font-family='Verdana' font-size='13' lengthAdjust='spacing' textLength='24